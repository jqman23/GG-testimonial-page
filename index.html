<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Global Gathering Testimonials</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="testimonial-widget" aria-labelledby="widget-title">
        <div class="intro">
          <p class="eyebrow">2022-2025 attendee feedback</p>
          <h1 id="widget-title">Global Gathering voices</h1>
          <p class="lede">
            Positive reflections from participants who valued the shared learning,
            international perspective, and sense of community.
          </p>
        </div>

        <div class="controls" aria-label="Filter testimonials by year">
          <button class="filter-button is-active" type="button" data-filter="all">All</button>
          <button class="filter-button" type="button" data-filter="2022">2022</button>
          <button class="filter-button" type="button" data-filter="2023">2023</button>
          <button class="filter-button" type="button" data-filter="2024">2024</button>
          <button class="filter-button" type="button" data-filter="2025">2025</button>
        </div>

        <div class="spotlight" aria-live="polite">
          <p class="quote-mark" aria-hidden="true">"</p>
          <blockquote id="spotlight-quote"></blockquote>
          <div class="spotlight-footer">
            <p id="spotlight-meta"></p>
            <div class="nav-controls" aria-label="Featured testimonial controls">
              <button id="previous-testimonial" type="button" aria-label="Previous testimonial">Prev</button>
              <button id="next-testimonial" type="button" aria-label="Next testimonial">Next</button>
            </div>
          </div>
        </div>

        <div id="testimonial-grid" class="testimonial-grid"></div>

        <p class="source-note">
          Curated from positive, general event feedback files for 2022, 2023, 2024, and 2025.
        </p>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
